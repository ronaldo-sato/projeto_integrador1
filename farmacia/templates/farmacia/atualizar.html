{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8">
    <title>Editar Farmácia | {{ farmacia.nome }}</title>
    <link rel="stylesheet" href="{% static 'css/global.css' %}">
    <link rel="stylesheet" href="{% static 'css/forms.css' %}">
    <link rel="stylesheet" href="{% static 'css/tables.css' %}">
    <link rel="stylesheet" href="{% static 'css/atualizar.css' %}">
  </head>

  <body id="body">

    <section class="section-page">

      <div class="main-content div-editar">
        <h3>Editar Registro</h3>
        <!-- Mensagem de feedback dos forms (css está no forms.css) -->
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
          {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        
        <form class="formulario" action="{% url 'farmacia:atualizar' farmacia.id %}" method="POST">
          {% csrf_token %}
          <p>
            <label for="nome-farmacia">Nome da Farmácia:</label>
            <input type="text" id="nome-farmacia" name="nome_farmacia" value="{{ farmacia.nome }}" required>
          </p>
          <p>
            <label for="endereco">Endereço:</label>
            <input type="text" id="endereco" name="endereco" value="{{ farmacia.endereco }}" required>
          </p>
          <p>
            <button type="submit" class="button">Alterar</button>
          </p>
        </form>
        <br>
        <a href="{% url 'farmacia:listar' %}" class="link-voltar">Cancelar e Voltar</a>
      </div>
    </section>

  </body>
</html>
